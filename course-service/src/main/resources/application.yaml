server:
  port: 9001

spring:
  application:
    name: course-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/course_db

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8443/realms/elearning-realm
          jwk-set-uri: http://localhost:8443/realms/elearning-realm/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
