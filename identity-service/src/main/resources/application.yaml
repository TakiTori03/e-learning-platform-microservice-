server:
  port: 9000
  forward-headers-strategy: framework

spring:
  application:
    name: identity-service

  datasource:
    # Kết nối tới DB identity_db trong Postgres
    url: jdbc:postgresql://localhost:5432/identity_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # Tự động tạo bảng từ Entity Java
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: elearning-client
            client-secret: rJCLZinRhL3Fjsls30jOq6LyX1dvQVUf
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
        provider:
          keycloak:
            issuer-uri: http://localhost:8443/realms/elearning-realm
            user-name-attribute: preferred_username
      resourceserver:
        jwt:
          # URL để Spring tự động tải Public Key về verify chữ ký Token
          issuer-uri: http://localhost:8443/realms/elearning-realm
          jwk-set-uri: http://localhost:8443/realms/elearning-realm/protocol/openid-connect/certs

  keycloak:
    auth-server-url: http://localhost:8443
    realm: elearning-realm
    client-id: elearning-client
    client-secret: rJCLZinRhL3Fjsls30jOq6LyX1dvQVUf

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true


logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.web.client: DEBUG
    org.hibernate.SQL: DEBUG