server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: identity-service-auth
          uri: lb://identity-service
          predicates:
            - Path=/oauth2/**, /login/**

        - id: identity-service-api
          uri: lb://identity-service
          predicates:
            - Path=/identity/**
          filters:
            - StripPrefix=1

        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/course/**
          filters:
            - StripPrefix=1

        - id: interaction-service
          uri: lb://interaction-service
          predicates:
            - Path=/interaction/**
          filters:
            - StripPrefix=1

        - id: learning-service
          uri: lb://learning-service
          predicates:
            - Path=/learning/**
          filters:
            - StripPrefix=1

        - id: media-service
          uri: lb://media-service
          predicates:
            - Path=/media/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order/**, /payment/**
          filters:
            - StripPrefix=1

      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.hust.apigateway: DEBUG
    root: INFO
