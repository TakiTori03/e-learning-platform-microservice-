server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://elearning-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: elearning-microservices
    static_configs:
      - targets: [localhost]
        labels:
          job: elearning-logs
          __path__: /var/log/elearning/*/logs/*.log

    pipeline_stages:
      - regex:
          source: filename
          expression: '.*[\\/](?P<service>[^\\/]+)[\\/]logs[\\/][^\\/]+\.log'
      - labels:
          service:
