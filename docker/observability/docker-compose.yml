services:
  elearning-prometheus:
    image: prom/prometheus:latest
    container_name: elearning-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - elearning_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default

  elearning-grafana:
    image: grafana/grafana:latest
    container_name: elearning-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - elearning_grafana_data:/var/lib/grafana
    depends_on:
      - elearning-prometheus
      - elearning-loki
      - elearning-tempo
    networks:
      - default

  elearning-loki:
    image: grafana/loki:2.9.2
    container_name: elearning-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - default

  elearning-promtail:
    image: grafana/promtail:2.9.2
    container_name: elearning-promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - ../..:/var/log/elearning
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - elearning-loki
    networks:
      - default

  elearning-tempo:
    image: grafana/tempo:2.4.1
    container_name: elearning-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo-config.yml:/etc/tempo.yaml
    ports:
      - "3200:3200"      # Tempo HTTP port (for Grafana queries)
      - "4317:4317"      # OTLP gRPC receiver
      - "4318:4318"      # OTLP HTTP receiver
    networks:
      - default

volumes:
  elearning_prometheus_data:
  elearning_grafana_data:

networks:
  default:
    name: elearning-network
    external: true
