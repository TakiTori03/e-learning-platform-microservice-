
services:
  elearning-order-db:
    image: postgres:15-alpine
    container_name: elearning-order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - order_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  order_postgres_data:

networks:
  default:
    name: elearning-network
    external: true
