services:
  elearning-ai-db:
    image: pgvector/pgvector:pg15
    container_name: elearning-ai-db
    environment:
      POSTGRES_DB: ai_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5435:5432"
    volumes:
      - ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ai_postgres_data:

networks:
  default:
    name: elearning-network
    external: true
