
services:
  elearning-learning-db:
    image: mongo:latest
    container_name: elearning-learning-db
    environment:
      MONGO_INITDB_DATABASE: learning_db
    ports:
      - "27018:27017"
    volumes:
      - learning_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  learning_mongo_data:

networks:
  default:
    name: elearning-network
    external: true
