server:
  port: 9002
  forward-headers-strategy: framework

spring:
  application:
    name: media-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27020/media_db}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8443/realms/elearning-realm}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8443/realms/elearning-realm/protocol/openid-connect/certs}

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

app:
  storage:
    local-path: ${STORAGE_LOCAL_PATH:./uploads}

  ffmpeg:
    path: ${FFMPEG_PATH:ffmpeg}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9100}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET:elearning-media}
    region: ${MINIO_REGION:us-east-1}

logging:
  level:
    root: INFO
    com.hust.mediaservice: DEBUG
    org.springframework.security: INFO
